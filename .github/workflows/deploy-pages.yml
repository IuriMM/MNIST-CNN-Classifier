name: Deploy Web Interface to GitHub Pages

on:
  push:
    branches: [ main, master, develop, mnist_att ]
    paths:
      - 'index.html'
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Alterado para '.' para incluir o index.html da raiz que redireciona para /web
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create deployment summary
        run: |
          echo "## 🚀 Web Interface Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment Status: Success" >> $GITHUB_STEP_SUMMARY
          echo "📍 URL: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "⏰ Time: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Deployed Files:" >> $GITHUB_STEP_SUMMARY
          echo "- \`index.html\` - Main interface" >> $GITHUB_STEP_SUMMARY
          echo "- \`css/style.css\` - Styling" >> $GITHUB_STEP_SUMMARY
          echo "- \`js/app.js\` - Application logic" >> $GITHUB_STEP_SUMMARY
          echo "- \`models/mnist_cnn.onnx\` - ML Model" >> $GITHUB_STEP_SUMMARY
